name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Black (format check)
        run: uv run black --check api.py backend/

      - name: isort (import order)
        run: uv run isort --check --diff api.py backend/

      - name: Flake8 (lint)
        run: uv run flake8 api.py backend/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
